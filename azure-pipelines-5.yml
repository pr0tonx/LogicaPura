# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
- main

pool:
  vmImage: ubuntu-latest

steps:
# Atualizar pacotes do sistema
- script:
    sudo apt-get update
  displayName: 'Atualizar pacotes'

# Instalar uma dependência real (cowsay)
- script:
    sudo apt-get install -y cowsay
  displayName: 'Instalar dependência (cowsay)'

# Build (simulado)
- script: 
    echo 'Realizando build do projeto...'
  displayName: 'Build do projeto'

# Testes (simulado)
- script:
    echo 'Executando testes'
  displayName: 'Executar testes'

# Executar algo real instalado
- script: 
    cowsay 'Pipeline funcionando com sucesso!'
  displayName: 'Executar aplicação'

